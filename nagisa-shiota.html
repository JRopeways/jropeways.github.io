<!DOCTYPE html>
<html>
<head>
    <title>Nagisa Shiota page (JRopeways website 3)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="nagifavicon.jpg">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body 
        {
            background-color: #39456B;
            font-family: 'Alan Sans', sans-serif;
        }
        .content
        {
            background-color: #ABD0F3;
            border-radius: 25px;
            padding: 20px;
            margin: 40px;
            text-align: center;
        }
        img
        {
            max-width: 100%;
            height: auto;
            border-radius: 25px;
        }
        h1
        {
            text-align: center;
        }
        h2
        {
            text-align: center;
        }
       body
        {
            cursor: url("https://jropeways.github.io/nagicursor.jpg"), default !important;
            margin: 0;
            overflow-x: hidden;
        }
        .customCursor
        {
            cursor: url("https://jropeways.github.io/nagicursor.jpg"), default !important;
        }
    /* This part is handcopied from AI, this is because I am self teaching myself CSS and aren't profficient yet*/
        .image-section {
            height: 100vh;          /* Full screen height */
            width: 100%;
            position: relative;     /* Allows absolute positioning inside */
            overflow: hidden;       /* Prevents overflow issues */
        }
        
        /* Stack all images */
        .image-section img {
            position: absolute;     /* Stack images on top of each other */
            width: 100%;
            height: 100%;
            object-fit: cover;
        
            opacity: 0;             /* Start invisible */
            transition: opacity 1s ease-in-out;  /* Smooth crossfade */
        }
        
        /* Visible image */
        .image-section img.active {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="content">
        <p style="background-image: url('nagisa-shiota.png');">
      <h1>Nagisa Shiota</h1>

      <a href="https://www.anime-colors.com/assassination-classroom-series/nagisa-shiota"><button type="button">Nagisa Colour pallette!</button></a>
            <p>Some nice photos of Nagisa</p>
            <p><small>All credits go to the creators, apologies I can't name you individually</small></p>
<br>
        <section class="image-section">
            <img src="https://jropeways.github.io/Nagisa.jpg">
            <img src="https://jropeways.github.io/nagisa (3).jpg">
            <img src="https://jropeways.github.io/nagisaoui.jpg">
            <img src="https://jropeways.github.io/poster thing.jpg">
        </section>
        

<!----- No go zone -------------------------------------------------------- -->
        <script>
        const images = document.querySelectorAll('.image-section img');

let currentIndex = 0;

// Show first image immediately
images[currentIndex].classList.add('active');

window.addEventListener('scroll', () => {

    const scrollPosition = window.scrollY;
    const windowHeight = window.innerHeight;

    // Calculate which image should show
    const newIndex = Math.floor(scrollPosition / windowHeight);

    if (newIndex !== currentIndex && newIndex < images.length) {
        images[currentIndex].classList.remove('active');
        images[newIndex].classList.add('active');
        currentIndex = newIndex;
    }

});
    </script>

    </div>
</body>
</html>
