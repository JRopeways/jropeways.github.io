<!DOCTYPE html>
<html>

<head>
    <title>‎JRopeways Website 4</title>

    <link href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="favicon.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-color: black;
            font-family: 'Alan Sans', sans-serif;
        }

        .content {
            background-color: white;
            border-radius: 25px;
            padding: 0px;
            margin: 25px;
            width: 40rem;
            height: 40rem;
            text-align: center;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .textbox {
            max-width: 800px;
            margin: 0 auto;
            /* Top/bottom margin 0, left/right margin auto */
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 25px;
        }

        h1 {
            text-align: center;
        }

        h2 {
            text-align: center;
        }

        dialog {
            background-color: white;
            border-radius: 25px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 800rem;
            height: 40rem;
            margin: 25px;
            text-align: center;

        }

        .titlebar {
            align-items: left;
        }

        button {
            border-radius: 8px;
            width: 67px;  
        }
    </style>
</head>

<body>
    <div class="center">
        <div class="content">
            <p>Site under construction, please check back in a bit</p>

<!----- About app -----------------------------------------------About app-------------------------------About app--------------------------------------------------------------------->

            <button commandfor="my-dialog" command="show-modal"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <clipPath id="box-clip">
      <rect width="40" height="40" rx="8"/>
    </clipPath>
  </defs>

  <rect width="40" height="40" rx="8" fill="#B22222"/>

  <path
    d="M0,12 C10,12 8,22 20,22 C32,22 30,30 40,30 L40,36 C30,36 32,28 20,28 C8,28 10,18 0,18 Z"
    fill="#FFF8DC"
    opacity="0.55"
    clip-path="url(#box-clip)"
  />

  <text
    x="20" y="26"
    text-anchor="middle"
    font-family="sans-serif"
    font-size="13"
    font-weight="700"
    letter-spacing="-0.5"
    fill="white"
    opacity="0.82"
  >J OS</text>
</svg><br>About</button>

            <dialog id="my-dialog">
                <div class="appcontent">
                    <div class="titlebar">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="16" height="16"
                            style="cursor:pointer;display:block" role="button" aria-label="Close" onclick="
    this.dispatchEvent(new CustomEvent('close-dialog', { bubbles: true, composed: true }));
    const dlg = this.closest('dialog') || this.closest('[role=dialog]');
    if (dlg) { typeof dlg.close === 'function' ? dlg.close() : dlg.remove(); }
  ">
                            <circle cx="16" cy="16" r="14.5" fill="none" stroke="currentColor" stroke-width="3" />
                            <line x1="10.5" y1="10.5" x2="21.5" y2="21.5" stroke="currentColor" stroke-width="3"
                                stroke-linecap="round" />
                            <line x1="21.5" y1="10.5" x2="10.5" y2="21.5" stroke="currentColor" stroke-width="3"
                                stroke-linecap="round" />
                        </svg>
                        <h3>About page</h3>
                    </div>
                    <p>JRopeways site Version 4.0</p>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
                        <defs>
                            <clipPath id="box-clip">
                                <rect width="40" height="40" rx="8" />
                            </clipPath>
                        </defs>

                        <rect width="40" height="40" rx="8" fill="#B22222" />

                        <path
                            d="M0,12 C10,12 8,22 20,22 C32,22 30,30 40,30 L40,36 C30,36 32,28 20,28 C8,28 10,18 0,18 Z"
                            fill="#FFF8DC" opacity="0.55" clip-path="url(#box-clip)" />

                        <text x="20" y="26" text-anchor="middle" font-family="sans-serif" font-size="13"
                            font-weight="700" letter-spacing="-0.5" fill="white" opacity="0.82">J OS</text>
                    </svg>
                    <p>J OS 1</p>
                    <p>Created 26/3/2026</p>
                    <p><small>CN: Awen</small></p>
                </div>
            </dialog>

            <br>
            <br>

<!----- Old site -----------------------------------------------Old site-------------------------------old site--------------------------------------------------------------------->

            <button commandfor="oldsite" command="show-modal"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <clipPath id="clip">
      <rect width="40" height="40" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="#B22222"/>

  <!-- Cornsilk stripe -->
  <path
    d="M0,10 C10,10 8,20 20,20 C32,20 30,28 40,28 L40,34 C30,34 32,26 20,26 C8,26 10,16 0,16 Z"
    fill="#FFF8DC"
    opacity="0.45"
    clip-path="url(#clip)"
  />

  <!-- Browser window frame -->
  <rect x="6" y="8" width="28" height="22" rx="2.5" fill="none" stroke="#FFF8DC" stroke-width="1.2" opacity="0.75"/>
  <line x1="6" y1="13" x2="34" y2="13" stroke="#FFF8DC" stroke-width="1" opacity="1"/>
  <circle cx="9.5" cy="10.5" r="1" fill="#FFF8DC" opacity="0.5"/>
  <circle cx="13"  cy="10.5" r="1" fill="#FFF8DC" opacity="0.5"/>
  <circle cx="16.5" cy="10.5" r="1" fill="#FFF8DC" opacity="0.5"/>
  <line x1="10" y1="17" x2="30" y2="17" stroke="#FFF8DC" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="10" y1="20" x2="26" y2="20" stroke="#FFF8DC" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="10" y1="23" x2="28" y2="23" stroke="#FFF8DC" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

  <!-- 3.0 -->
  <text x="29" y="36" text-anchor="middle" font-family="sans-serif"
    font-size="7" font-weight="700" fill="#FFF8DC" opacity="0.85">3.0</text>

  <!-- JR faint watermark -->
  <text x="8" y="36" text-anchor="middle" font-family="sans-serif"
    font-size="6" font-weight="400" fill="#FFF8DC" opacity="0.3">JR</text>
</svg><br>Old site</button>

            <dialog id="oldsite">
                <div class="appcontent">
                    <div class="titlebar">
                        <h3>Old homepage</h3>
                        <iframe src="https://jropeways.github.io/indexold" frameborder="0" width="800" height="800"></iframe>
                </div>
            </dialog>
        </div>
    </div>
</body>

</html>
